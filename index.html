<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSDS Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LANDING -->
<section id="landing">
  <div class="overlay">
    <h1>MSDS Library</h1>
    <p>Kumpulan dokumen keselamatan bahan kimia</p>
    <button onclick="enterApp()">Masuk</button>
  </div>
</section>

<!-- APP -->
<div id="app" class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png">
      <span>TPTP 24B</span>
    </div>

    <nav>
      <button onclick="showSection('msds')">📂 MSDS</button>
      <button onclick="showSection('gallery')">🎞️˙✧˖°📷 ༘ ⋆｡˚ Gallery</button>
      <button onclick="showSection('about')">📝 About</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h2>MSDS Library</h2>
      <input type="text" id="search" placeholder="Cari bahan kimia...">
      <button onclick="toggleMusic()">🔊</button>
    </div>

    <!-- MSDS -->
    <section id="msds" class="section active">

      <div class="container">

        <aside class="file-list">
          <ul id="list"></ul>
        </aside>

        <div class="viewer">

          <div class="info-bar">
            <span id="viewerTitle">Pilih dokumen</span>
          </div>
        </div>

      </div>

    </section>

    <!-- GALLERY -->
 <section id="gallery" class="section">
  <h2>Gallery</h2>

  <div class="gallery-grid" id="galleryGrid">
    <img src="gallery/img1.jpeg">
    <img src="gallery/img2.jpeg">
    <img src="gallery/img3.jpeg">
    <img src="gallery/img4.jpeg">
    <img src="gallery/img5.jpeg">
  </div>

  <!-- MODAL -->
  <div id="modal">
    <span id="closeBtn">&times;</span>
    <img id="modalImg">
    <div class="nav prev">&#10094;</div>
    <div class="nav next">&#10095;</div>
  </div>

</section>

    <!-- ABOUT -->
    <section id="about" class="section">
      <h2>About</h2>
      <p>YOW GUYS. This is TPTPB24 UGLY BASTARD PRESENT</p>
    </section>

  </main>
</div>

  <audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
