<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSDS Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- LANDING -->
<section id="landing">
  <div class="overlay">
    <h1>MSDS Library</h1>
    <p>Kumpulan dokumen keselamatan bahan kimia</p>
    <button onclick="enterApp()">Masuk</button>
  </div>
</section>

<!-- APP -->
<div id="app" class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <span>TPTP 24B</span>
    </div>

    <nav>
      <button onclick="showSection('msds', this)">📂 MSDS</button>
      <button onclick="showSection('gallery', this)">📷 Gallery</button>
      <button onclick="showSection('about', this)">📝 About</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h2>MSDS Library</h2>
      <input type="text" id="search" placeholder="Cari bahan kimia...">
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="card">📄 <span id="totalDocs">0</span><p>Dokumen</p></div>
      <div class="card">🔍 <span id="totalSearch">0</span><p>Pencarian</p></div>
      <div class="card">📂 Library<p>MSDS</p></div>
    </div>

    <!-- MSDS -->
    <section id="msds" class="section active">

      <div class="container">

        <aside class="file-list">
          <ul id="list"></ul>
        </aside>

        <div class="viewer">

          <div class="info-bar">
            📄 <span id="viewerTitle">Pilih dokumen</span>
            <button id="downloadBtn">⬇ Download</button>
          </div>

          <div id="emptyState">
            <h3>📄 Pilih dokumen</h3>
            <p>Gunakan search untuk menemukan file</p>
          </div>

          <iframe id="viewerFrame"></iframe>

        </div>

      </div>

    </section>

    <!-- GALLERY -->
    <section id="gallery" class="section">
      <h2>Gallery</h2>

      <div class="gallery-grid" id="galleryGrid">
        <img src="gallery/img1.jpeg">
        <img src="gallery/img2.jpeg">
        <img src="gallery/img3.jpeg">
        <img src="gallery/img4.jpeg">
        <img src="gallery/img5.jpeg">
      </div>

      <!-- MODAL -->
      <div id="modal">
        <span id="closeBtn">&times;</span>
        <img id="modalImg">
        <div class="nav prev">&#10094;</div>
        <div class="nav next">&#10095;</div>
      </div>

    </section>

    <!-- ABOUT -->
    <section id="about" class="section">
      <h2>About</h2>
      <p>TPTP 24B MSDS Library</p>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
